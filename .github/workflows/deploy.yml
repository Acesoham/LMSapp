name: Deploy LMS App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            # Find the application directory (handling case-sensitivity)
            if [ -d "/home/ubuntu/LMSapp" ]; then
                cd /home/ubuntu/LMSapp
            elif [ -d "/home/ubuntu/LMSAPP" ]; then
                cd /home/ubuntu/LMSAPP
            else
                echo "Directory not found, searching..."
                APP_DIR=$(find /home/ubuntu -maxdepth 2 -name "LMS*" -type d | head -n 1)
                if [ -z "$APP_DIR" ]; then
                    echo "Could not find LMS directory"
                    exit 1
                fi
                cd "$APP_DIR"
            fi

            echo "Deploying in: $(pwd)"
            git fetch origin
            git reset --hard origin/main

            # Determine docker compose command (v2 or v1)
            if docker compose version >/dev/null 2>&1; then
                DOCKER_COMPOSE="sudo docker compose"
            else
                DOCKER_COMPOSE="sudo docker-compose"
            fi

            # Build and restart all services
            $DOCKER_COMPOSE down
            $DOCKER_COMPOSE up --build -d

